<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Slime Jump Survival v2</title>
    <style>
        body { margin: 0; overflow: hidden; background: #e0f7fa; font-family: sans-serif; touch-action: none; }
        
        /* 広告エリア：高さを150pxに設定（中サイズ対応） */
        #ad-top, #ad-bottom { 
            position: fixed; left: 0; width: 100%; height: 150px; 
            background: #333; z-index: 100; display: flex; align-items: center; justify-content: center; 
        }
        #ad-top { top: 0; }
        #ad-bottom { bottom: 0; }
        
        iframe { border: none; width: 100%; height: 150px; }

        /* キャンバス：広告を避けて中央に配置 */
        canvas { display: block; margin-top: 150px; background: #81d4fa; }
        
        #ui { position: absolute; top: 160px; left: 0; width: 100%; text-align: center; color: #01579b; font-size: 26px; font-weight: bold; pointer-events: none; text-shadow: 1px 1px 2px rgba(255,255,255,0.8); }
        
        #startScreen { 
            position: absolute; top: 150px; left: 0; width: 100%; height: calc(100vh - 300px); 
            background: rgba(255,255,255,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 50; 
        }
        #goButton { padding: 15px 40px; font-size: 24px; background: #0288d1; border: none; border-radius: 50px; color: white; font-weight: bold; cursor: pointer; box-shadow: 0 4px #01579b; }
        #best-info { margin-top: 15px; color: #01579b; font-weight: bold; }
    </style>
</head>
<body>

    <div id="ad-top"><iframe id="frame-top" src="ad.html"></iframe></div>
    <div id="ad-bottom"><iframe id="frame-bottom" src="ad.html"></iframe></div>

    <div id="startScreen">
        <h1 style="color:#0288d1; margin-bottom: 10px;">SLIME JUMP</h1>
        <p style="margin-bottom: 20px;">タップで方向転換！</p>
        <button id="goButton">START</button>
        <p id="best-info">BEST SCORE: <span id="best-ui">0</span></p>
    </div>

    <div id="ui">SCORE: 0</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const ui = document.getElementById("ui");
        const startScreen = document.getElementById("startScreen");
        const goButton = document.getElementById("goButton");
        const bestUi = document.getElementById("best-ui");

        // キャンバスサイズ設定（上下150pxずつ引く）
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight - 300;

        let score = 0;
        let bestScore = localStorage.getItem("slime_jump_best") || 0;
        let gameActive = false;
        let player = { x: canvas.width / 2, y: canvas.height - 50, size: 22, speed: 7, dir: 1 };
        let obstacles = [];
        bestUi.innerText = bestScore;

        goButton.onclick = () => {
            startScreen.style.display = "none";
            gameActive = true;
            score = 0;
            obstacles = [];
            ui.innerText = "SCORE: 0";
            spawnObstacle();
            update();
        };

        // 操作：どこを触っても方向転換
        window.addEventListener("pointerdown", (e) => {
            if(gameActive) player.dir *= -1;
        });

        function spawnObstacle() {
            if(!gameActive) return;
            const size = 30 + Math.random() * 20;
            obstacles.push({ 
                x: Math.random() * (canvas.width - size), 
                y: -50, 
                size: size, 
                speed: 3 + (score / 15) // 徐々に加速
            });
            
            let nextSpawn = Math.max(350, 1100 - (score * 12));
            setTimeout(spawnObstacle, nextSpawn);
        }

        function update() {
            if(!gameActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // プレイヤー移動と壁跳ね返り
            player.x += player.speed * player.dir;
            if(player.x < player.size || player.x > canvas.width - player.size) {
                player.dir *= -1;
            }

            // スライム描画
            ctx.fillStyle = "#ff4081";
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.size, 0, Math.PI * 2);
            ctx.fill();

            // 敵の移動と判定
            for(let i = obstacles.length - 1; i >= 0; i--) {
                let ob = obstacles[i];
                ob.y += ob.speed;
                
                ctx.fillStyle = "#37474f";
                ctx.fillRect(ob.x, ob.y, ob.size, ob.size);

                // 当たり判定
                let closestX = Math.max(ob.x, Math.min(player.x, ob.x + ob.size));
                let closestY = Math.max(ob.y, Math.min(player.y, ob.y + ob.size));
                let dx = player.x - closestX;
                let dy = player.y - closestY;
                
                if ((dx * dx + dy * dy) < (player.size * player.size)) {
                    gameOver();
                    return;
                }

                // スコア加算
                if(ob.y > canvas.height) {
                    obstacles.splice(i, 1);
                    score++;
                    ui.innerText = "SCORE: " + score;
                }
            }
            requestAnimationFrame(update);
        }

        function gameOver() {
            gameActive = false;
            if(score > bestScore) {
                bestScore = score;
                localStorage.setItem("slime_jump_best", bestScore);
            }
            alert("GAME OVER! SCORE: " + score);
            location.reload();
        }

        // 🚀 30秒ごとにad.htmlを強制リフレッシュ
        setInterval(() => {
            ["frame-top", "frame-bottom"].forEach(id => {
                const f = document.getElementById(id);
                if(f) {
                    const s = f.src; f.src = "about:blank";
                    setTimeout(() => f.src = s, 100);
                }
            });
        }, 30000);
    </script>
</body>
</html>
