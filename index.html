<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Slime Jump Survival v2</title>
    <style>
        body { 
            margin: 0; height: 100vh; display: flex; flex-direction: column; 
            background: #e0f7fa; font-family: sans-serif; overflow: hidden; touch-action: none; 
        }
        
        /* 上下の広告エリア：150pxを維持（中サイズにも対応可能） */
        #ad-top, #ad-bottom { 
            width: 100%; height: 150px; background: #333; 
            display: flex; align-items: center; justify-content: center; flex-shrink: 0; z-index: 100;
        }
        iframe { border: none; width: 100%; height: 100%; }

        /* ゲームエリア：残りの高さをすべて使う */
        #game-area { 
            flex-grow: 1; position: relative; width: 100%; background: #81d4fa; overflow: hidden;
        }
        
        canvas { display: block; width: 100%; height: 100%; }
        
        #ui { position: absolute; top: 10px; width: 100%; text-align: center; color: #01579b; font-size: 26px; font-weight: bold; pointer-events: none; z-index: 10; text-shadow: 1px 1px 2px rgba(255,255,255,0.8); }
        
        /* メニュー画面：鉄壁レイアウト */
        #menuScreen { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255,255,255,0.95); display: flex; flex-direction: column; 
            align-items: center; justify-content: space-between; z-index: 200; padding: 10px 0; box-sizing: border-box;
        }

        #ad-middle-container { 
            width: 300px; height: 250px; background: #ddd;
            display: none; justify-content: center; align-items: center; 
            overflow: hidden; flex-shrink: 0; border: 1px solid #ccc;
        }
        
        .btn-group { 
            display: flex; flex-direction: column; align-items: center; gap: 8px; 
            width: 100%; padding-bottom: 5px;
        }
        .menu-btn { padding: 12px 30px; font-size: 17px; border: none; border-radius: 50px; color: white; font-weight: bold; cursor: pointer; text-decoration: none; width: 220px; text-align: center; }
        #goButton { background: #0288d1; box-shadow: 0 4px #01579b; }
        .link-btn { background: #ff4081; box-shadow: 0 4px #c2185b; }
        .best-info { color: #01579b; font-size: 18px; font-weight: bold; margin: 2px 0; }
    </style>
</head>
<body>
    <div id="ad-top"><iframe src="ad.html" id="frame-top"></iframe></div>

    <div id="game-area">
        <div id="ui">SCORE: 0</div>
        
        <div id="menuScreen">
            <div style="text-align:center;">
                <h1 id="menuTitle" style="color:#0288d1; margin:0; font-size: 24px;">SLIME JUMP</h1>
                <p id="menuMsg" style="margin:2px 0; font-size:14px;">タップで方向転換！</p>
                <div class="best-info">BEST SCORE: <span id="best-ui">0</span></div>
            </div>

            <div id="ad-middle-container">
                <script src="https://adm.shinobi.jp/s/1e6de436ea850948e238e975a93767eb"></script>
            </div>

            <div class="btn-group" id="btnGroup">
                <button id="goButton" class="menu-btn">GAME START</button>
                <a href="https://saaaachi.github.io/slime-math/" class="menu-btn link-btn">他のゲームはこちら</a>
            </div>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <div id="ad-bottom"><iframe src="ad.html" id="frame-bottom"></iframe></div>

    <script>
        const canvas = document.getElementById("gameCanvas"), ctx = canvas.getContext("2d"),
              ui = document.getElementById("ui"), menuScreen = document.getElementById("menuScreen"),
              menuTitle = document.getElementById("menuTitle"), menuMsg = document.getElementById("menuMsg"),
              bestUi = document.getElementById("best-ui"), goButton = document.getElementById("goButton"),
              adMid = document.getElementById("ad-middle-container"), btnGroup = document.getElementById("btnGroup");

        let score = 0, bestScore = localStorage.getItem("slime_jump_best") || 0;
        let gameActive = false, player, obstacles = [], spawnTimeout;

        function resize() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            player = { x: canvas.width / 2, y: canvas.height - 50, size: 22, speed: 7, dir: 1 };
        }
        window.onload = () => { resize(); bestUi.innerText = bestScore; adMid.style.display = "none"; };
        window.onresize = resize;

        goButton.onclick = () => {
            menuScreen.style.display = "none";
            adMid.style.display = "none";
            gameActive = true;
            score = 0;
            obstacles = [];
            ui.innerText = "SCORE: 0";
            resize(); // 位置リセット
            spawnObstacle();
            update();
        };

        window.addEventListener("pointerdown", (e) => {
            if(gameActive && menuScreen.style.display === "none") player.dir *= -1;
        });

        function spawnObstacle() {
            if(!gameActive) return;
            const size = 30 + Math.random() * 20;
            obstacles.push({ 
                x: Math.random() * (canvas.width - size), 
                y: -50, 
                size: size, 
                speed: 3 + (score / 15)
            });
            let nextSpawn = Math.max(350, 1100 - (score * 12));
            spawnTimeout = setTimeout(spawnObstacle, nextSpawn);
        }

        function update() {
            if(!gameActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            player.x += player.speed * player.dir;
            if(player.x < player.size || player.x > canvas.width - player.size) {
                player.dir *= -1;
            }

            ctx.fillStyle = "#ff4081";
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.size, 0, Math.PI * 2);
            ctx.fill();

            for(let i = obstacles.length - 1; i >= 0; i--) {
                let ob = obstacles[i];
                ob.y += ob.speed;
                ctx.fillStyle = "#37474f";
                ctx.fillRect(ob.x, ob.y, ob.size, ob.size);

                let closestX = Math.max(ob.x, Math.min(player.x, ob.x + ob.size));
                let closestY = Math.max(ob.y, Math.min(player.y, ob.y + ob.size));
                let dx = player.x - closestX;
                let dy = player.y - closestY;
                
                if ((dx * dx + dy * dy) < (player.size * player.size)) {
                    gameOver();
                    return;
                }

                if(ob.y > canvas.height) {
                    obstacles.splice(i, 1);
                    score++;
                    ui.innerText = "SCORE: " + score;
                }
            }
            requestAnimationFrame(update);
        }

        function gameOver() {
            gameActive = false;
            clearTimeout(spawnTimeout);
            if(score > bestScore) {
                bestScore = score;
                localStorage.setItem("slime_jump_best", bestScore);
                bestUi.innerText = bestScore;
            }
            menuTitle.innerText = "GAME OVER";
            menuTitle.style.color = "#f44336";
            menuMsg.innerText = "SCORE: " + score;
            goButton.innerText = "RETRY";

            btnGroup.style.opacity = "0";
            btnGroup.style.pointerEvents = "none";
            adMid.style.display = "flex"; 
            menuScreen.style.display = "flex";

            setTimeout(() => {
                btnGroup.style.opacity = "1";
                btnGroup.style.pointerEvents = "auto";
            }, 600);
        }

        setInterval(() => {
            document.querySelectorAll('iframe').forEach(f => {
                const s = f.src; f.src = "about:blank"; setTimeout(() => f.src = s, 100);
            });
        }, 30000);
    </script>
</body>
</html>
